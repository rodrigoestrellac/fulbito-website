<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Teamgeist 2006 stylized ball -->
  <defs>
    <radialGradient id="ballShine" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="60%" stop-color="#f0f0f0"/>
      <stop offset="100%" stop-color="#d9d9d9"/>
    </radialGradient>
    <linearGradient id="goldAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#C8A84E"/>
      <stop offset="50%" stop-color="#E8D48B"/>
      <stop offset="100%" stop-color="#C8A84E"/>
    </linearGradient>
  </defs>
  <!-- Ball body -->
  <circle cx="100" cy="100" r="92" fill="url(#ballShine)" stroke="#222" stroke-width="2"/>
  <!-- Teamgeist panel curves (characteristic propeller shape) -->
  <!-- Top-right panel -->
  <path d="M100,18 Q140,50 155,100 Q140,90 100,85 Q110,50 100,18Z" fill="#1a1a1a" opacity="0.9"/>
  <!-- Bottom-left panel -->
  <path d="M100,182 Q60,150 45,100 Q60,110 100,115 Q90,150 100,182Z" fill="#1a1a1a" opacity="0.9"/>
  <!-- Left panel -->
  <path d="M18,100 Q50,60 100,45 Q90,60 85,100 Q50,90 18,100Z" fill="#1a1a1a" opacity="0.9"/>
  <!-- Right panel -->
  <path d="M182,100 Q150,140 100,155 Q110,140 115,100 Q150,110 182,100Z" fill="#1a1a1a" opacity="0.9"/>
  <!-- Gold accent lines (signature Teamgeist seams) -->
  <path d="M100,18 Q110,50 100,85" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M155,100 Q140,90 100,85" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M100,182 Q90,150 100,115" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M45,100 Q60,110 100,115" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M18,100 Q50,90 85,100" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M182,100 Q150,110 115,100" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M100,45 Q90,60 85,100" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M100,155 Q110,140 115,100" fill="none" stroke="url(#goldAccent)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Center subtle circle -->
  <circle cx="100" cy="100" r="16" fill="none" stroke="url(#goldAccent)" stroke-width="1.5" opacity="0.6"/>
  <!-- Shine highlight -->
  <ellipse cx="72" cy="62" rx="22" ry="15" fill="white" opacity="0.25" transform="rotate(-30,72,62)"/>
</svg>
